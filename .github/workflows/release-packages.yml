name: Release packages

on:
  # Pushing a tag like v1.4.1 builds and publishes that release automatically.
  # Tags carrying a pre-release suffix (e.g. v1.5.0-rc1) are marked as a
  # GitHub prerelease.
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g., v1.4.1). Leave empty or set to 'latest' to use the latest v* tag."
        required: false
        default: "latest"
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  build:
    name: Build packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all history and tags so we can resolve 'latest'

      - name: Compute version/tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PRERELEASE="false"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Triggered by a tag push: use the pushed tag directly.
            TAG="${{ github.ref_name }}"
            # SemVer pre-release suffix (e.g. v1.5.0-rc1) → mark as prerelease.
            if [[ "$TAG" == *-* ]]; then PRERELEASE="true"; fi
          else
            INPUT_TAG="${{ github.event.inputs.tag }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
            if [[ -z "${INPUT_TAG}" || "${INPUT_TAG}" == "latest" ]]; then
              # Find latest SemVer-ish tag starting with 'v'
              TAG=$(git tag --list 'v*' | sort -V | tail -n1)
              if [[ -z "$TAG" ]]; then
                echo "::error::No tags found matching 'v*'. Push a tag like v1.4.1 or specify a tag manually.";
                exit 1
              fi
            else
              TAG="${INPUT_TAG}"
            fi
          fi
          # Validate tag exists
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag not found: $TAG";
            git tag --list | sort -V | tail -n 20 | sed 's/^/hint: /'
            exit 1
          fi
          CLEAN="${TAG#v}"
          echo "version=$CLEAN" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Setup Go (for nfpm)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare dist dir
        run: mkdir -p dist

      - name: Update pyproject.toml with release version
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml version to $VERSION"
          grep "^version = " pyproject.toml

      - name: Build packages
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          nfpm pkg --packager deb       -f packaging/nfpm.yaml --target dist/
          nfpm pkg --packager rpm       -f packaging/nfpm.yaml --target dist/
          nfpm pkg --packager archlinux -f packaging/nfpm.yaml --target dist/

      # Build the Python source distribution (tar.gz) only once — on amd64 —
      # because sdist content is architecture-independent.
      - name: Setup Python (sdist)
        if: matrix.arch == 'amd64'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdist (voxd-<version>.tar.gz)
        if: matrix.arch == 'amd64'
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxd-${{ steps.meta.outputs.version }}-${{ matrix.arch }}
          path: dist/*

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}

  release:
    name: Create GitHub Release and upload assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write   # create the release
      actions: write    # dispatch the gigachat-bundle workflow
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create/Update Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: VOXD ${{ needs.build.outputs.tag }}
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
          files: |
            dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger gigachat wheels bundle
        # The release above is created with GITHUB_TOKEN, and events raised by
        # GITHUB_TOKEN do not cascade to other workflows — so the gigachat-bundle
        # "release: published" trigger never fires on its own. Dispatch it
        # explicitly for the same tag so the offline wheels bundle is built and
        # attached to this release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run gigachat-bundle.yml \
            --repo "${{ github.repository }}" \
            -f tag="${{ needs.build.outputs.tag }}"


